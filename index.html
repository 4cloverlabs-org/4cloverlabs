<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4CloverLabs - Coming Soon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-blob"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <span class="clover-icon">🍀</span>
                <span class="brand-name">4CloverLabs</span>
                <span class="badge">soon 2026</span>
            </div>
        </header>

        <main>
            <h1 class="hero-title">
                <span class="text-dark">Coming soon.</span>
                <span class="text-gradient">Innovating for tomorrow.</span>
            </h1>
            
            <p class="subtitle">
                Stay close to the launch and be among the first to see what's coming. We are building something extraordinary.
            </p>

            <form class="notify-form" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <input type="email" placeholder="Your Email Address" required>
                    <button type="submit">Get Notified</button>
                </div>
            </form>

            <div class="social-links">
                <a href="#">Instagram</a>
                <span class="dot">•</span>
                <a href="#">LinkedIn</a>
                <span class="dot">•</span>
                <a href="#">X</a>
            </div>
        </main>

        <footer>
            <p>Created by 4CloverLabs • <a href="#">Privacy Policy</a></p>
        </footer>
    </div>
</body>
</html>
